name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run audit:static-data

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run test

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e:loading
        env:
          AUTH_SECRET: ci-only-loading-test-secret-ci-only-loading-test-secret
          AUTH_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
